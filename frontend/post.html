<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일기 보기 - 성다은의 휴학일기</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; padding: 30px; display: flex; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .post-date { color: #888; font-size: 14px; margin-bottom: 5px; }
        .post-title { font-size: 28px; color: #333; margin-top: 0; margin-bottom: 10px; }
        .post-desc { color: #555; font-style: italic; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-content { font-size: 16px; line-height: 1.6; color: #444; margin-bottom: 40px; white-space: pre-wrap; }
        .comments-section { background-color: #f9f9f9; padding: 20px; border-radius: 8px; }
        .comment-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .comment-author { font-weight: bold; color: #2196F3; margin-bottom: 5px; font-size: 14px; }
        .comment-text { margin: 0; color: #333; font-size: 15px; }
        .comment-input-area { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; resize: vertical; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #666; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="index.html" class="back-link" style="margin-bottom: 0;">← 목록으로 돌아가기</a>
            <button onclick="deletePost()" style="background-color: #f44336; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">🗑️ 일기 삭제</button>
        </div>
        <div id="post-details">
            <p>데이터를 불러오는 중입니다...</p>
        </div>

        <div class="comments-section">
            <h3>💬 댓글 (<span id="comment-count">0</span>)</h3>
            <div id="comments-list"></div>
            <div id="comment-form-area"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://my-leave-of-absence-diary.onrender.com';
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        document.addEventListener("DOMContentLoaded", () => {
            if (!postId || postId === 'undefined') {
                alert("잘못된 접근입니다!");
                window.location.href = 'index.html';
                return;
            }
            loadPostData();
            loadComments();
            setupCommentForm();
        });

        // post.html의 loadPostData() 함수를 이것으로 교체!
        async function loadPostData() {
            try {
                const response = await fetch(`${BASE_URL}/api/timeline/${postId}`);
                if (!response.ok) throw new Error("일기를 찾을 수 없습니다.");
                const post = await response.json();

                const postDetailsDiv = document.getElementById('post-details');
                
                // 🌟 추가된 부분: 사진/동영상이 여러 개면 촤라락 그려주는 코드!
                let mediaHtml = '';
                if (post.images && post.images.length > 0) {
                    mediaHtml = '<div style="text-align: center; margin-bottom: 20px;">';
                    
                    // 배열에 있는 주소를 하나씩 꺼내서 태그로 만듭니다.
                    post.images.forEach(url => {
                        // 🌟 .mp4 거나 .mov 일 때 모두 비디오 태그를 쓰도록 합칩니다.
                        if (url.includes('.mp4') || url.includes('.mov')) {
                            // 🌟 마법의 코드: 주소에 .mov가 있으면 .mp4로 강제로 바꿔서 요청합니다!
                            const videoUrl = url.replace('.mov', '.mp4');
                            mediaHtml += `<video src="${url}" controls style="max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto;"></video>`;
                        } else {
                            mediaHtml += `<img src="${url}" style="max-width: 100%; border-radius: 8px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto;">`;
                        }
                    });
                    
                    mediaHtml += '</div>';
                }

                postDetailsDiv.innerHTML = `
                    <div class="post-date">${post.date}</div>
                    <h1 class="post-title">${post.title}</h1>
                    <div class="post-desc">${post.desc}</div>
                    
                    ${mediaHtml} 
                    
                    <div class="post-content">${post.content || "내용이 없습니다."}</div>
                `;
            } catch (error) {
                document.getElementById('post-details').innerHTML = `<p style="color:red;">에러: ${error.message}</p>`;
            }
        }

        async function loadComments() {
            try {
                const response = await fetch(`${BASE_URL}/api/comments/${postId}`);
                const comments = await response.json();
                document.getElementById('comment-count').innerText = comments.length;
                const commentsListDiv = document.getElementById('comments-list');
                
                if (comments.length === 0) {
                    commentsListDiv.innerHTML = '<p style="color: #888; text-align: center;">아직 댓글이 없습니다.</p>';
                    return;
                }

                commentsListDiv.innerHTML = comments.map(comment => `
                    <div class="comment-item">
                        <div class="comment-author">🧑‍💻 ${comment.author}</div>
                        <p class="comment-text">${comment.content}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error("댓글 로딩 실패:", error);
            }
        }

        function setupCommentForm() {
            const token = localStorage.getItem('token');
            const formArea = document.getElementById('comment-form-area');
            if (token) {
                formArea.innerHTML = `
                    <div class="comment-input-area">
                        <textarea id="new-comment" rows="3" placeholder="댓글을 입력하세요..."></textarea>
                        <button onclick="submitComment()">댓글 등록</button>
                    </div>
                `;
            } else {
                formArea.innerHTML = `<p style="text-align:center; font-size:14px; color:#666;">댓글을 쓰려면 로그인이 필요합니다.</p>`;
            }
        }

        async function submitComment() {
            const content = document.getElementById('new-comment').value;
            const token = localStorage.getItem('token');
            if (!content.trim()) return;

            try {
                const response = await fetch(`${BASE_URL}/api/comments`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ postId, content })
                });

                if (response.ok) {
                    document.getElementById('new-comment').value = '';
                    loadComments();
                }
            } catch (error) {
                alert("댓글 등록 실패");
            }
        }
        // 🗑️ 일기 삭제 기능
        async function deletePost() {

            if (localStorage.getItem('role') === 'guest') {
                alert("🔒 심사위원용 테스트 계정입니다! 안전을 위해 삭제 기능은 제한되어 있습니다. 🙇‍♀️");
                return; // 삭제 안 하고 여기서 끝!
            }
            // 실수로 누를 수 있으니 한 번 물어봅니다!
            if (!confirm("정말 이 일기를 삭제할까요? (복구할 수 없습니다!)")) {
                return; 
            }

            try {
                const response = await fetch(`${BASE_URL}/api/timeline/${postId}`, {
                    method: 'DELETE', // 삭제하겠다는 강력한 의지!
                });

                if (response.ok) {
                    alert("일기가 삭제되었습니다. 🧹");
                    window.location.href = 'index.html'; // 목록으로 튕겨내기
                } else {
                    alert("삭제 실패!");
                }
            } catch (error) {
                console.error("삭제 중 에러:", error);
            }
        }
    </script>
</body>
</html>
