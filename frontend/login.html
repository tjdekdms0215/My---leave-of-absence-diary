<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 성다은의 휴학일기</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .back-link { display: block; margin-top: 15px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>🔐 로그인</h2>
        
        <div class="input-group">
            <label>아이디</label>
            <input type="text" id="username" placeholder="아이디를 입력하세요" />
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" />
        </div>
        
        <button onclick="login()">로그인하기</button>

        <a href="index.html" class="back-link">메인 화면으로 돌아가기</a>
    </div>

    <script>
        async function login() {
            // 1. 화면에서 입력한 아이디와 비밀번호 가져오기 (이름 일치시킴!)
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // 🌟 [추가된 부분] 게스트 계정 가로채기 (비밀 통로)
            // 빈칸 검사나 백엔드 서버로 가기 전에 제일 먼저 검사합니다!
            if (usernameInput === 'guest' && passwordInput === '1234') {
                localStorage.setItem('token', 'guest_dummy_token'); // 가짜 통행증 발급
                localStorage.setItem('role', 'guest'); // 🌟 핵심: 게스트 꼬리표 달기!
                
                alert("👨‍💻 심사위원(게스트) 계정으로 로그인되었습니다! 환영합니다.");
                window.location.href = 'index.html';
                return; // 진짜 서버 로그인은 안 하도록 여기서 함수 종료!
            }

            // 2. 빈칸 검사
            if (!usernameInput || !passwordInput) {
                alert("아이디와 비밀번호를 모두 입력해주세요!");
                return;
            }

            try {
                // 3. 다은님의 백엔드 로그인 API 주소!
                const url = 'https://my-leave-of-absence-diary.onrender.com/api/login'; 

                // 4. 백엔드로 로그인 요청 (택배) 보내기
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                // 5. 서버에서 온 답장(성공 메시지, 토큰 등)을 자바스크립트가 읽을 수 있게 변환
                const data = await response.json();

                if (response.ok) {
                    // 🌟 다은님 진짜 계정 로그인 성공 시
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', 'admin'); // 다은님은 'admin' (관리자) 꼬리표 달기!
                    
                    alert("로그인 성공! 환영합니다 🎉");
                    window.location.href = 'index.html'; 
                } else {
                    // 아이디가 없거나 비밀번호가 틀렸을 때 서버가 보낸 에러 메시지 띄우기
                    alert(data.message);
                }
            } catch (error) {
                console.error("로그인 에러:", error);
                alert("서버와 연결할 수 없습니다. 잠시 후 다시 시도해주세요.");
            }
        }
    </script>

</body>
</html>
