<body>
    <div class="write-container">
        <h2>✏️ 새 일기 쓰기</h2>
        
        <div class="form-group">
            <label>날짜</label>
            <input type="date" id="date">
        </div>
        
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="title" placeholder="일기 제목을 입력하세요">
        </div>
        
        <div class="form-group">
            <label>한 줄 요약 (목록에 보여요!)</label>
            <input type="text" id="desc" placeholder="오늘 하루를 한 줄로 요약한다면?">
        </div>
        
        <div class="form-group">
            <label>상세 내용</label>
            <div id="editor-container"></div> 
        </div>

        <div class="form-group">
            <label>갤러리 사진/동영상 첨부 (최대 10장)</label>
            <input type="file" id="media" multiple accept="image/*, video/*">
        </div>
        
        <div style="display: flex; justify-content: space-between; margin-top: 20px;">
            <a href="index.html" class="back-link">← 취소하고 돌아가기</a>
            <button class="save-btn" onclick="savePost()">저장하기</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 1. 에디터 그리기 시작!
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '오늘 어떤 일이 있었나요? 사진과 함께 자세한 이야기를 들려주세요!',
            modules: {
                toolbar: {
                    container: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ],
                    handlers: {
                        image: imageHandler
                    }
                }
            }
        });

        // 2. 에디터 전용 사진기사 함수
        function imageHandler() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            input.onchange = async () => {
                const file = input.files[0];
                const formData = new FormData();
                formData.append('image', file); 

                try {
                    const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/upload/image', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const url = data.url; 
                        const range = quill.getSelection();
                        quill.insertEmbed(range.index, 'image', url);
                    } else {
                        alert('이미지 업로드 실패!');
                    }
                } catch (error) {
                    console.error('에디터 사진 업로드 에러:', error);
                }
            };
        }

        // 3. 최종 저장 함수 (게스트 방어 코드 포함!)
        async function savePost() {
            // 🛡️ 심사위원(게스트) 차단기!
            if (localStorage.getItem('role') === 'guest') {
                alert("✨ 심사위원용 테스트 계정입니다! 에디터 체험은 가능하지만, 실제 데이터베이스에는 저장되지 않습니다. 멋진 평가 부탁드립니다! 🙇‍♀️");
                window.location.href = 'index.html'; 
                return; 
            }

            const date = document.getElementById('date').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const content = quill.root.innerHTML; 
            const mediaFiles = document.getElementById('media').files;

            if (!date || !title || !desc) {
                alert("날짜, 제목, 한 줄 요약은 꼭 적어주세요!");
                return;
            }

            const formData = new FormData();
            formData.append('date', date);
            formData.append('title', title);
            formData.append('desc', desc);
            formData.append('content', content);
            
            for (let i = 0; i < mediaFiles.length; i++) {
                formData.append('media', mediaFiles[i]);
            }

            const token = localStorage.getItem('token');

            try {
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.innerText = "저장 중... ⏳";
                saveBtn.disabled = true;

                const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/timeline', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    alert("일기와 사진들이 성공적으로 저장되었습니다! 🎉");
                    window.location.href = 'index.html'; 
                } else {
                    const errorData = await response.json();
                    alert("저장 실패: " + (errorData.message || "서버 오류"));
                }
            } catch (error) {
                console.error("저장 에러:", error);
                alert("서버와 연결할 수 없습니다.");
            } finally {
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.innerText = "저장하기";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
