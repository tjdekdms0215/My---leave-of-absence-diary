<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 일기 쓰기 - 성다은의 휴학일기</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        /* 에디터가 들어갈 공간의 크기와 둥근 테두리 설정 */
        #editor-container {
            height: 400px;
            background-color: white;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }
        .write-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"], input[type="date"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .save-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .save-btn:hover { background-color: #45a049; }
        .back-link { text-decoration: none; color: #888; display: inline-block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="write-container">
            <h2>✏️ 새 일기 쓰기</h2>
            
            <div class="form-group">
                <label>날짜</label>
                <input type="date" id="date">
            </div>
            
            <div class="form-group">
                <label>제목</label>
                <input type="text" id="title" placeholder="일기 제목을 입력하세요">
            </div>
            
            <div class="form-group">
                <label>한 줄 요약 (목록에 보여요!)</label>
                <input type="text" id="desc" placeholder="오늘 하루를 한 줄로 요약한다면?">
            </div>
            
            <div class="form-group">
                <label>상세 내용 (사진/동영상 첨부 가능!)</label>
                <div id="editor-container"></div> 
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <a href="index.html" class="back-link">← 취소하고 돌아가기</a>
                <button id="save-btn" class="save-btn" onclick="savePost()">저장하기</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
   <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 🌟 1. Quill 에디터에게 '진짜 HTML5 동영상(mp4, mov)' 재생 방법을 가르쳐줍니다!
        const BlockEmbed = Quill.import('blots/block/embed');
        class CustomVideoBlot extends BlockEmbed {
            static create(url) {
                let node = super.create();
                node.setAttribute('src', url);
                node.setAttribute('controls', ''); // 재생 버튼 등 컨트롤러 표시
                node.setAttribute('playsinline', ''); // 모바일에서도 깔끔하게 재생
                return node;
            }
            static value(node) {
                return node.getAttribute('src');
            }
        }
        CustomVideoBlot.blotName = 'video';
        CustomVideoBlot.tagName = 'video'; // iframe 대신 진짜 <video> 태그 사용!
        Quill.register(CustomVideoBlot);

        // 2. 에디터 기본 설정
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '오늘 어떤 일이 있었나요? 사진과 동영상을 함께 남겨보세요!',
            modules: {
                toolbar: {
                    container: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ],
                    handlers: {
                        image: imageHandler,
                        video: videoHandler
                    }
                }
            }
        });

        // 3. 미디어(사진/영상) 통합 업로드 함수
        async function uploadMedia(file, type) {
            const saveBtn = document.getElementById('save-btn');
            const originalText = saveBtn.innerText;
            
            saveBtn.innerText = "미디어 서버 전송 중... ⏳ (조금 오래 걸릴 수 있어요)";
            saveBtn.style.backgroundColor = "#ff9800"; 
            saveBtn.disabled = true;

            const formData = new FormData();
            formData.append('image', file); 

            try {
                const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/upload/image', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    let url = data.url; 
                    
                    if (url.includes('.mov')) {
                        url = url.replace('.mov', '.mp4');
                    }

                    const range = quill.getSelection(true); 
                    quill.insertEmbed(range.index, type, url); 
                    quill.setSelection(range.index + 1, Quill.sources.SILENT);
                } else {
                    alert('미디어 업로드에 실패했습니다. 파일 용량을 확인해주세요.');
                }
            } catch (error) {
                console.error('업로드 에러:', error);
                alert('서버 연결 문제로 업로드하지 못했습니다.');
            } finally {
                saveBtn.innerText = originalText;
                saveBtn.style.backgroundColor = "#4CAF50";
                saveBtn.disabled = false;
            }
        }

        // 4. 버튼 핸들러
        function imageHandler() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = () => { uploadMedia(input.files[0], 'image'); };
        }

        function videoHandler() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'video/*');
            input.click();
            input.onchange = () => { uploadMedia(input.files[0], 'video'); };
        }

        // 5. 최종 저장 함수
        async function savePost() {
            if (localStorage.getItem('role') === 'guest') {
                alert("✨ 심사위원용 테스트 계정입니다! 에디터 체험은 가능하지만, 실제 데이터베이스에는 저장되지 않습니다. 멋진 평가 부탁드립니다! 🙇‍♀️");
                window.location.href = 'index.html'; 
                return; 
            }

            const date = document.getElementById('date').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            const content = quill.root.innerHTML; 

            if (!date || !title || !desc) {
                alert("날짜, 제목, 한 줄 요약은 꼭 적어주세요!");
                return;
            }

            const formData = new FormData();
            formData.append('date', date);
            formData.append('title', title);
            formData.append('desc', desc);
            formData.append('content', content);

            const token = localStorage.getItem('token');
            const saveBtn = document.getElementById('save-btn');

            try {
                saveBtn.innerText = "일기 저장 중... ⏳";
                saveBtn.disabled = true;

                const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/timeline', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    alert("일기가 성공적으로 저장되었습니다! 🎉");
                    window.location.href = 'index.html'; 
                } else {
                    const errorData = await response.json();
                    alert("저장 실패: " + (errorData.message || "서버 오류"));
                }
            } catch (error) {
                console.error("저장 에러:", error);
                alert("서버와 연결할 수 없습니다.");
            } finally {
                saveBtn.innerText = "저장하기";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
