<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 1. Quill 에디터 설정 (사진 버튼을 가로채는 'handlers' 추가!)
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '오늘 어떤 일이 있었나요? 사진과 함께 자세한 이야기를 들려주세요!',
            modules: {
                toolbar: {
                    container: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'color': [] }, { 'background': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ],
                    handlers: {
                        // 🌟 에디터의 '이미지' 버튼을 누르면 우리가 만든 imageHandler가 실행됩니다!
                        image: imageHandler
                    }
                }
            }
        });

        // 2. 📸 전담 사진기사 함수: 사진을 고속도로(API)로 몰래 보내고 주소를 받아옴
        function imageHandler() {
            // 가상의 파일 선택 창을 만듭니다.
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();

            // 파일이 선택되면 실행됨
            input.onchange = async () => {
                const file = input.files[0];
                const formData = new FormData();
                formData.append('image', file); // 'image'라는 이름으로 담기 (server.js와 일치해야 함)

                try {
                    // 아까 뚫어놓은 고속도로로 발사!
                    const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/upload/image', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const url = data.url; // 클라우디너리가 준 진짜 주소!
                        
                        // 현재 에디터에서 커서가 있는 위치를 찾아서, 그 자리에 사진 꽂아 넣기
                        const range = quill.getSelection();
                        quill.insertEmbed(range.index, 'image', url);
                    } else {
                        alert('이미지 업로드 실패!');
                    }
                } catch (error) {
                    console.error('에디터 사진 업로드 에러:', error);
                }
            };
        }

        // 3. 💾 최종 일기 저장 함수
        async function savePost() {
            if (localStorage.getItem('role') === 'guest') {
                alert("✨ 심사위원용 테스트 계정입니다! 에디터 체험은 가능하지만, 실제 데이터베이스에는 저장되지 않습니다. 멋진 평가 부탁드립니다! 🙇‍♀️");
                window.location.href = 'index.html'; // 쿨하게 목록으로 돌려보내기
                return; // 백엔드로 데이터 안 보내고 여기서 끝!
            }
            const date = document.getElementById('date').value;
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;
            
            // 🌟 핵심 변경: 밋밋한 텍스트가 아니라, 에디터가 만든 '그림 포함 HTML'을 통째로 가져옵니다!
            const content = quill.root.innerHTML; 
            
            const mediaFiles = document.getElementById('media').files;

            if (!date || !title || !desc) {
                alert("날짜, 제목, 한 줄 요약은 꼭 적어주세요!");
                return;
            }

            const formData = new FormData();
            formData.append('date', date);
            formData.append('title', title);
            formData.append('desc', desc);
            formData.append('content', content); // 🌟 에디터 내용 담기
            
            for (let i = 0; i < mediaFiles.length; i++) {
                formData.append('media', mediaFiles[i]);
            }

            const token = localStorage.getItem('token');

            try {
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.innerText = "저장 중... ⏳";
                saveBtn.disabled = true;

                const response = await fetch('https://my-leave-of-absence-diary.onrender.com/api/timeline', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (response.ok) {
                    alert("일기와 사진들이 성공적으로 저장되었습니다! 🎉");
                    window.location.href = 'index.html'; 
                } else {
                    const errorData = await response.json();
                    alert("저장 실패: " + (errorData.message || "서버 오류"));
                }
            } catch (error) {
                console.error("저장 에러:", error);
                alert("서버와 연결할 수 없습니다.");
            } finally {
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.innerText = "저장하기";
                saveBtn.disabled = false;
            }
        }
    </script>
